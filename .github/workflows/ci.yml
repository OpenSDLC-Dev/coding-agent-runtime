name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome (format + lint + imports, no writes)
        run: pnpm exec biome ci .

  verify:
    name: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: |
          pnpm --filter @app/runtime typecheck
          pnpm --filter @app/web typecheck
      - name: Test
        run: pnpm -r run test
      - name: Build
        run: pnpm -r run build

  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build runtime image
        run: docker build -f apps/runtime/Dockerfile -t coding-agent-runtime:ci .

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # No cache here: this job runs `pnpm audit` straight from the lockfile
          # without `pnpm install`, so there is no pnpm store to cache.
      - name: Audit dependencies (fail on high or critical)
        run: pnpm audit --audit-level high
