name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome (format + lint + imports, no writes)
        run: pnpm exec biome ci .

  verify:
    name: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r run typecheck
      - name: Test
        run: pnpm -r run test
      - name: Build
        run: pnpm -r run build

  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build runtime image
        run: docker build -f apps/runtime/Dockerfile -t coding-agent-runtime:ci .

  smoke:
    name: smoke (SDK x CLI real turn)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # The Agent SDK and the standalone CLI are deliberately decoupled (SDK 0.3.x + claude-code 2.1.x),
    # talking over stdio/stream-json. This job runs one real turn end-to-end to catch version drift that
    # unit tests (which stub the SDK) cannot. Skipped on fork PRs: repository secrets are unavailable there.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build runtime image
        run: docker build -f apps/runtime/Dockerfile -t coding-agent-runtime:smoke .
      - name: Run one real turn and assert init + result
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          RUNTIME_DEFAULT_MODEL: ${{ secrets.RUNTIME_DEFAULT_MODEL }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not configured -> skipping the real-turn smoke (not a failure)."
            exit 0
          fi
          docker run -d --name rt \
            -e ANTHROPIC_API_KEY -e ANTHROPIC_BASE_URL -e RUNTIME_DEFAULT_MODEL \
            -e RUNTIME_HOSTNAME=0.0.0.0 -e RUNTIME_MAX_TURNS=3 \
            -p 8080:8080 coding-agent-runtime:smoke
          node scripts/smoke.mjs
      - name: Runtime logs
        if: always()
        run: docker logs rt 2>&1 || true
      - name: Cleanup
        if: always()
        run: docker rm -f rt || true

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # No cache here: this job runs `pnpm audit` straight from the lockfile
          # without `pnpm install`, so there is no pnpm store to cache.
      - name: Audit dependencies (fail on high or critical)
        run: pnpm audit --audit-level high
