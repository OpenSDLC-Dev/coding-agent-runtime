receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Forward traces to Jaeger (Jaeger all-in-one exposes OTLP gRPC on 4317)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Expose metrics for Prometheus to scrape
  prometheus:
    endpoint: 0.0.0.0:8889
  # logs land in the collector's own log output (the receiver end of spec §3.3 OTEL_LOGS_EXPORTER=otlp)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
